name: Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.*'
permissions:
  contents: write
jobs:
  release:
    uses: eclipse-opensovd/cicd-workflows/.github/workflows/tauri-release.yml@219d244bacf292087455b972bb5215160ff99c61
    with:
      app-name: "MDD UI"
      app-binary-name: "mdd-ui"
      rust-version: "1.88.0"
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
