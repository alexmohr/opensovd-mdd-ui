name: Rust CI
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true
jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.88.0
          components: clippy, rustfmt
      - name: Install Linux system dependencies
        uses: ./.github/actions/install-linux-deps
      - name: Install cargo-deny
        run: cargo install --locked --version 0.18.9 cargo-deny
      - name: Install taplo toml toolkit
        run: cargo install --locked --version 0.10.0 taplo-cli
      - name: Build
        run: cargo build --locked --verbose
      - name: Check licenses
        run: cargo deny check licenses
      - name: Check advisories
        run: cargo deny check advisories
      - name: Check allowed sources
        run: cargo deny check sources
      - name: Check banned practises
        run: cargo deny check bans
      - name: Build
        run: cargo build --locked --verbose
      - name: Test
        run: cargo test --locked -- --show-output
  build_all_features:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.88.0
      - name: Install Linux system dependencies
        uses: ./.github/actions/install-linux-deps
      - name: Build with all features
        run: cargo build --locked --all-features --verbose
      - name: Test with all features
        run: cargo test --locked --all-features -- --show-output
