name: Install Linux system dependencies
description: Installs the system libraries required to build a Tauri v2 app on Linux
runs:
  using: composite
  steps:
    - name: Install Linux system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          build-essential \
          libssl-dev \
          libxdo-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libglib2.0-dev \
          libgtk-3-dev \
          pkg-config
